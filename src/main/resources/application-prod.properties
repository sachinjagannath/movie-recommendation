# Prod Profile - production server
# All credentials come from environment variables - never hardcode them
# Set these on your server / Docker / Kubernetes:
#     export DB_HOST=10.0.1.5
#     export DB_PORT=3306
#     export DB_NAME=moviesdb
#     export DB_USER=movies_app
#     export DB_PASS=<strong_password>

# Datasource

spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&serverTimeZone=UTC&requireSSL=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── HikariCP pool (production-grade) ─────────────────────────────────────────
spring.datasource.hikari.pool-name=MovieApp-Prod-Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=20
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.leak-detection-threshold=5000
spring.datasource.hikari.initialization-fail-timeout=60000

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# validate — Hibernate only CHECKS the schema, never alters it
# Schema changes in prod must be done via migration scripts (Flyway/Liquibase)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
 
# ── Tomcat thread pool ────────────────────────────────────────────────────────
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20